name: Build macOS DMG
on: workflow_dispatch
permissions:
  contents: write
jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Unzip desktop project
        run: unzip -q mac-app.zip
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: mac-app
        run: npm install
      - name: Build DMG (arm64, ad-hoc signed)
        working-directory: mac-app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac dmg --arm64 --publish never
      - name: Show output
        run: ls -la mac-app/dist
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: checklist-dmg
          path: mac-app/dist/*.dmg
          if-no-files-found: error
      - name: Publish DMG to Release v1
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload v1 mac-app/dist/*.dmg --clobber \
            || gh release create v1 mac-app/dist/*.dmg --title "daily-checklist v1" --notes "Auto-built"
