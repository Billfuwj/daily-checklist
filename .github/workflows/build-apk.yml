name: Build APK
on: workflow_dispatch
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Unzip project
        run: unzip -q checklist-app.zip
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'
      - name: Build debug APK
        working-directory: checklist-app
        run: gradle assembleDebug --no-daemon --stacktrace
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: checklist-apk
          path: checklist-app/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
      - name: Publish APK as Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create v1 "checklist-app/app/build/outputs/apk/debug/app-debug.apk" --title "daily-checklist v1" --notes "Auto-built debug APK" \
            || gh release upload v1 "checklist-app/app/build/outputs/apk/debug/app-debug.apk" --clobber
